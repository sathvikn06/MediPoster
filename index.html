<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediPoster - Hospital Clinic Poster Generator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 700px; margin: 0 auto; }
    .header {
      text-align: center;
      color: white;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 32px;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      padding: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    textarea { resize: vertical; min-height: 80px; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 2rem;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover { background: #5568d3; }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }
    .btn-secondary:hover { background: #e8e8e8; }
    #output {
      margin-top: 2rem;
      padding: 1rem;
      background: #f5f5f5;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      font-family: 'Monaco', monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
      color: #333;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .success-msg {
      margin-top: 1rem;
      padding: 12px;
      background: #4caf50;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      text-align: center;
    }
    .color-input { width: 80px; height: 40px; cursor: pointer; }
    @media (max-width: 600px) {
      .two-col { grid-template-columns: 1fr; }
      .header h1 { font-size: 24px; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏥 MediPoster</h1>
      <p>Hospital & Clinic Poster Generator</p>
    </div>

    <div class="card">
      <form id="form">
        <div class="form-group">
          <label>Organization Name *</label>
          <input type="text" id="orgName" placeholder="e.g., City Care Hospital" required>
        </div>

        <div class="form-group">
          <label>Address *</label>
          <input type="text" id="address" placeholder="123 Medical Street, Hyderabad" required>
        </div>

        <div class="form-group two-col">
          <div>
            <label>Phone *</label>
            <input type="tel" id="phone" placeholder="+91 XXXXXX" required>
          </div>
          <div>
            <label>Email *</label>
            <input type="email" id="email" placeholder="contact@hospital.com" required>
          </div>
        </div>

        <div class="form-group">
          <label>Services (comma-separated) *</label>
          <input type="text" id="services" placeholder="Emergency, Surgery, ICU, Cardiology" required>
        </div>

        <div class="form-group">
          <label>Key Message *</label>
          <textarea id="message" placeholder="e.g., 24/7 Healthcare Excellence" required></textarea>
        </div>

        <div class="form-group">
          <label>Logo/Image URL</label>
          <input type="url" id="imageUrl" placeholder="https://example.com/logo.png">
        </div>

        <div class="form-group">
          <label>Brand Color</label>
          <input type="color" id="brandColor" class="color-input" value="#667eea">
        </div>

        <div class="button-group">
          <button type="button" class="btn-primary" onclick="exportJSON()">
            <i class="ti ti-download"></i> Export JSON
          </button>
          <button type="button" class="btn-secondary" onclick="copyPrompt()">
            <i class="ti ti-copy"></i> Copy for AI
          </button>
        </div>

        <div id="output"></div>
        <div class="success-msg" id="successMsg">✓ Copied to clipboard!</div>
      </form>
    </div>
  </div>

  <script>
    function getFormData() {
      return {
        organizationName: document.getElementById('orgName').value,
        address: document.getElementById('address').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        services: document.getElementById('services').value.split(',').map(s => s.trim()),
        keyMessage: document.getElementById('message').value,
        logoUrl: document.getElementById('imageUrl').value || null,
        brandColor: document.getElementById('brandColor').value,
        generatedAt: new Date().toISOString()
      };
    }

    function exportJSON() {
      const data = getFormData();
      const json = JSON.stringify(data, null, 2);
      const output = document.getElementById('output');
      output.textContent = json;
      output.style.display = 'block';
    }

    function copyPrompt() {
      const data = getFormData();
      const prompt = `Here's hospital/clinic data in JSON format. Use it to generate a professional poster:

\`\`\`json
${JSON.stringify(data, null, 2)}
\`\`\`

Create a poster design using this information. Make it attractive for hospitals/clinics with:
- Clear hierarchy with organization name prominent
- Key services listed visually
- Brand color accent
- Contact info easy to read
- Professional layout suitable for print`;

      navigator.clipboard.writeText(prompt).then(() => {
        const msg = document.getElementById('successMsg');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
      });
    }

    document.getElementById('form').onsubmit = (e) => e.preventDefault();
  </script>
</body>
</html>
