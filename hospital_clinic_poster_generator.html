
<div style="max-width: 600px; margin: 0 auto; padding: 1rem;">
  <div style="background: var(--surface-2); border-radius: 12px; border: 0.5px solid var(--border); padding: 1.5rem;">
    <h2 style="margin: 0 0 1.5rem; font-size: 18px; font-weight: 500;">Hospital/Clinic Poster Generator</h2>
    
    <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem;">
      <div>
        <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;">Organization Name</label>
        <input type="text" id="orgName" placeholder="e.g., City Care Hospital" style="width: 100%; padding: 0.5rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px;" />
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;">Address</label>
        <input type="text" id="address" placeholder="123 Medical Street, Hyderabad" style="width: 100%; padding: 0.5rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px;" />
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div>
          <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;">Phone</label>
          <input type="text" id="phone" placeholder="+91 XXXXXX" style="width: 100%; padding: 0.5rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px;" />
        </div>
        <div>
          <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;">Email</label>
          <input type="text" id="email" placeholder="contact@hospital.com" style="width: 100%; padding: 0.5rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px;" />
        </div>
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;">Services (comma-separated)</label>
        <input type="text" id="services" placeholder="Emergency, Surgery, ICU, Cardiology" style="width: 100%; padding: 0.5rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px;" />
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;">Key Message</label>
        <textarea id="message" placeholder="e.g., 24/7 Healthcare Excellence" style="width: 100%; padding: 0.5rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; min-height: 60px; resize: none;"></textarea>
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;">Logo/Image URL</label>
        <input type="text" id="imageUrl" placeholder="https://example.com/logo.png" style="width: 100%; padding: 0.5rem; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px;" />
      </div>

      <div>
        <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;">Brand Color (hex)</label>
        <input type="color" id="brandColor" value="#1D9E75" style="width: 60px; height: 36px; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer;" />
      </div>
    </div>

    <div style="display: flex; gap: 12px;">
      <button onclick="exportJSON()" style="flex: 1; padding: 0.5rem; background: var(--fill-accent); color: var(--text-primary); border: none; border-radius: var(--radius); cursor: pointer; font-weight: 500; font-size: 14px;">Export JSON</button>
      <button onclick="copyToClipboard()" style="flex: 1; padding: 0.5rem; background: transparent; border: 0.5px solid var(--border-strong); border-radius: var(--radius); cursor: pointer; font-weight: 500; font-size: 14px;">Copy Code</button>
    </div>

    <div id="output" style="margin-top: 1.5rem; padding: 1rem; background: var(--surface-1); border-radius: var(--radius); border: 0.5px solid var(--border); font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; display: none; white-space: pre-wrap; word-break: break-word; color: var(--text-secondary);"></div>

    <div style="margin-top: 1rem; padding: 1rem; background: var(--bg-success); border-radius: var(--radius); font-size: 13px; color: var(--text-success); display: none;" id="successMsg">
      <i class="ti ti-check" style="margin-right: 6px;" aria-hidden="true"></i>Copied to clipboard!
    </div>
  </div>
</div>

<script>
function getFormData() {
  return {
    organizationName: document.getElementById('orgName').value,
    address: document.getElementById('address').value,
    phone: document.getElementById('phone').value,
    email: document.getElementById('email').value,
    services: document.getElementById('services').value.split(',').map(s => s.trim()),
    keyMessage: document.getElementById('message').value,
    logoUrl: document.getElementById('imageUrl').value,
    brandColor: document.getElementById('brandColor').value,
    generatedAt: new Date().toISOString()
  };
}

function exportJSON() {
  const data = getFormData();
  const json = JSON.stringify(data, null, 2);
  const output = document.getElementById('output');
  output.textContent = json;
  output.style.display = 'block';
}

function copyToClipboard() {
  const data = getFormData();
  
  const prompt = `Here's hospital/clinic data in JSON format. Use it to generate a professional poster:

\`\`\`json
${JSON.stringify(data, null, 2)}
\`\`\`

Create a poster design using this information. Make it attractive for hospitals/clinics with:
- Clear hierarchy with organization name prominent
- Key services listed visually
- Brand color accent
- Contact info easy to read
- Professional layout suitable for print
`;

  navigator.clipboard.writeText(prompt).then(() => {
    const msg = document.getElementById('successMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
  });
}
</script>
